publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  dio: ^5.9.2
  flutter_secure_storage: ^10.3.1
  socket_io_client: ^3.1.6
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.3
  local_auth: ^3.0.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  image_picker: ^1.2.2
  intl: ^0.20.3
  permission_handler: ^12.0.3
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
