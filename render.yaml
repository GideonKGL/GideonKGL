# Render Blueprint for the Guardian Tracker platform.
#
# Provisions the backend API (Node web service) and the web portal (static
# site), wired to an EXISTING Render PostgreSQL database. Deploy by creating a
# new Blueprint in the Render dashboard pointing at this repository.
#
# DATABASE_URL is `sync: false`, so Render prompts for it when the Blueprint is
# applied. Paste the database's "Internal Database URL" (recommended: the API is
# pinned to the `ohio` region to match, low latency, no SSL flag needed) or its
# "External Database URL" with `?sslmode=require` appended.
#
# After the first deploy, confirm the generated service URLs. Render names
# services `https://<name>.onrender.com`; if a name is taken it gets a random
# suffix, in which case update the cross-referenced URLs below (WEB_ORIGIN /
# DESKTOP_ORIGIN on the API and VITE_API_BASE_URL / VITE_SOCKET_URL on the web).

services:
  # Backend API: Express + Prisma + Socket.IO.
  - type: web
    name: guardian-tracker-api
    runtime: node
    plan: free
    region: ohio
    # Install only the backend workspace (avoids the Electron download from the
    # desktop workspace), generate the Prisma client, then compile TypeScript.
    # --include=dev forces TypeScript/@types to install even though NODE_ENV is
    # production (npm would otherwise omit devDependencies and break tsc).
    buildCommand: npm ci --include=dev -w @guardian/backend && npm run prisma:generate -w @guardian/backend && npm run build -w @guardian/backend
    # Apply migrations and seed roles/admin (both idempotent) before starting.
    startCommand: npm run migrate -w @guardian/backend && npm run seed -w @guardian/backend && node backend/dist/server.js
    healthCheckPath: /api/health/db
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the server reads it via env.PORT.
      # Existing Render PostgreSQL: set this when applying the Blueprint
      # (Internal URL preferred, or External URL with ?sslmode=require).
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        value: https://guardian-tracker-web.onrender.com
      - key: DESKTOP_ORIGIN
        value: https://guardian-tracker-web.onrender.com

  # Web portal: React + Vite single-page app served as a static site.
  - type: web
    name: guardian-tracker-web
    runtime: static
    buildCommand: npm ci --include=dev -w @guardian/web && npm run build -w @guardian/web
    staticPublishPath: web/dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_BASE_URL
        value: https://guardian-tracker-api.onrender.com/api/v1
      - key: VITE_SOCKET_URL
        value: https://guardian-tracker-api.onrender.com
      # Optional: set a real key in the dashboard to enable the Live Map tiles.
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
    routes:
      # SPA fallback so client-side routes resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html
