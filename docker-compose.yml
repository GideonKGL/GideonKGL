services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guardian_tracker
      POSTGRES_USER: guardian
      POSTGRES_PASSWORD: guardian_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardian -d guardian_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://guardian:guardian_password@postgres:5432/guardian_tracker?schema=public
      WEB_ORIGIN: http://localhost:5173
      DESKTOP_ORIGIN: http://localhost:5174
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api/v1
        VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web

volumes:
  postgres-data:
